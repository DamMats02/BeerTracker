<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.html</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-dark: #0369a1;
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-card: #111827;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: 1fr 1.5fr;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
            font-size: 1.2rem;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 5px;
            background: #334155;
        }

        .status-connected { background: #065f46; color: #34d399; }

        .beer-card {
            background: var(--surface-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .beer-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .beer-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #e2e8f0;
        }

        .brewery-name {
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .beer-meta {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            background: var(--surface);
            padding: 5px 10px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        .rating { color: #fbbf24; font-weight: bold; }
        .sync-indicator {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🇬🇷 Greek Craft Beer Tracker</h1>
        <p>Log beers into your decentralized GitHub database repository</p>
    </header>

    <div class="grid">
        <!-- LEFT COLUMN: CONFIG & FORM -->
        <div>
            <!-- GitHub Settings -->
            <div class="card">
                <h2>1. GitHub Database Config</h2>
                <div class="form-group">
                    <label for="ghToken">Personal Access Token (PAT)</label>
                    <input type="password" id="ghToken" placeholder="github_pat_...">
                </div>
                <div class="form-group">
                    <label for="ghRepo">Repository Path</label>
                    <input type="text" id="ghRepo" placeholder="username/repo-name">
                </div>
                <div class="form-group">
                    <label for="ghPath">File Path in Repo</label>
                    <input type="text" id="ghPath" value="beers.json">
                </div>
                <button id="testConnectionBtn" style="background:#475569;">Connect & Sync Repo</button>
                <div id="connStatus" class="status-badge">Not Configured (Using Local Fallback)</div>
            </div>

            <!-- Form -->
            <div class="card">
                <h2>2. Log a New Greek Beer</h2>
                <form id="beerForm">
                    <div class="form-group">
                        <label for="beerName">Beer Name</label>
                        <input type="text" id="beerName" required placeholder="e.g., Jasmine">
                    </div>
                    <div class="form-group">
                        <label for="brewery">Microbrewery</label>
                        <input type="text" id="brewery" required placeholder="e.g., Strange Brew">
                    </div>
                    <div class="form-group">
                        <label for="region">Region of Greece</label>
                        <input type="text" id="region" required placeholder="e.g., Athens, Attica">
                    </div>
                    <div class="form-group">
                        <label for="beerStyle">Style</label>
                        <input type="text" id="beerStyle" required placeholder="e.g., New England IPA">
                    </div>
                    <div class="form-group">
                        <label for="beerAbv">ABV (%)</label>
                        <input type="number" id="beerAbv" step="0.1" placeholder="e.g., 6.2">
                    </div>
                    <div class="form-group">
                        <label for="beerRating">Your Rating</label>
                        <select id="beerRating">
                            <option value="⭐⭐⭐⭐⭐">⭐⭐⭐⭐⭐</option>
                            <option value="⭐⭐⭐⭐">⭐⭐⭐⭐</option>
                            <option value="⭐⭐⭐">⭐⭐⭐</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="beerNotes">Tasting Notes</label>
                        <textarea id="beerNotes" rows="2" placeholder="Where did you drink it? Flavors?"></textarea>
                    </div>
                    <button type="submit">Commit to Database</button>
                </form>
            </div>
        </div>

        <!-- RIGHT COLUMN: BEER FEED -->
        <div class="card">
            <h2>Greek Beer Feed</h2>
            <div id="beerFeed"></div>
        </div>
    </div>
</div>

<script>
    // Initial Seed Data: Famous Craft Beers Throughout Greece
    const greekSeedBeers = [
        { id: 1, name: "Jasmine", brewery: "Strange Brew", region: "Athens, Attica", style: "Hazy IPA", abv: "6.2", rating: "⭐⭐⭐⭐⭐", notes: "Explosive citrus and tropical fruit aromas. Arguably one of Greece's most famous modern craft IPAs." },
        { id: 2, name: "8th Day (8η Μέρα)", brewery: "Septem Microbrewery", region: "Orologio, Evia", style: "India Pale Ale", abv: "7.0", rating: "⭐⭐⭐⭐⭐", notes: "Award-winning IPA from Evia. Creamy head, aromatic pine, and rich caramel malts with an intense bitter finish." },
        { id: 3, name: "Harma Pilsner", brewery: "Cretan Brewery", region: "Chania, Crete", style: "Pilsner", abv: "5.0", rating: "⭐⭐⭐⭐", notes: "Fresh, unpasteurized lager right from Chania. Incredibly crisp, light golden color, clean hoppy finish." },
        { id: 4, name: "Sknipa Bold", brewery: "Standard Microbrewery of Thessaloniki", region: "Thessaloniki", style: "Imperial IPA", abv: "8.0", rating: "⭐⭐⭐⭐", notes: "Strong, heavily dry-hopped profile originating up North. Strong notes of resin and grapefruit." },
        { id: 5, name: "Night Vision", brewery: "Noctua Brewery", region: "Gazi, Athens", style: "Black IPA", abv: "7.2", rating: "⭐⭐⭐⭐⭐", notes: "Dark malty roasted body clashing beautifully with bright citrusy dry hops. Excellent craft microbrew out of Athens." },
        { id: 6, name: "Crazy Donkey", brewery: "Santorini Brewing Company", region: "Santorini Island", style: "Wine IPA", abv: "6.5", rating: "⭐⭐⭐⭐⭐", notes: "The first IPA brewed in Greece, utilizing local Assyrtiko grape must alongside hops. Highly unique and regional." }
    ];

    let currentBeers = [...greekSeedBeers];
    let currentSha = null; // Stored to make writing updates to GitHub possible

    const beerForm = document.getElementById('beerForm');
    const beerFeed = document.getElementById('beerFeed');
    const connStatus = document.getElementById('connStatus');

    // Render logic
    function renderFeed() {
        beerFeed.innerHTML = '';
        [...currentBeers].reverse().forEach(beer => {
            const card = document.createElement('div');
            card.className = 'beer-card';
            card.innerHTML = `
                <div class="beer-header">
                    <div class="beer-name">${escapeHTML(beer.name)}</div>
                    <div class="rating">${beer.rating}</div>
                </div>
                <div class="brewery-name">📍 ${escapeHTML(beer.brewery)} (${escapeHTML(beer.region)})</div>
                <div class="beer-meta">
                    <span><strong>Style:</strong> ${escapeHTML(beer.style)}</span>
                    <span>•</span>
                    <span><strong>ABV:</strong> ${beer.abv ? beer.abv + '%' : 'N/A'}</span>
                </div>
                <p style="font-size:0.9rem; color:#cbd5e1;">${escapeHTML(beer.notes || 'No tasting notes recorded.')}</p>
                <div class="sync-indicator">${beer.id < 10 ? '📦 System Seed Beer' : '💾 Database Synced Record'}</div>
            `;
            beerFeed.appendChild(card);
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // GitHub Integration Engine
    async function syncWithGitHub(action = 'fetch', newBeerObj = null) {
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const path = document.getElementById('ghPath').value.trim();

        if (!token || !repo) {
            if(action === 'save') {
                alert("GitHub credentials missing! Saving locally to runtime instead.");
                currentBeers.push(newBeerObj);
                renderFeed();
            }
            return;
        }

        const url = `https://api.github.com/repos/${repo}/contents/${path}`;
        const headers = {
            "Authorization": `token ${token}`,
            "Accept": "application/vnd.github.v3+json",
            "Content-Type": "application/json"
        };

        try {
            // Step 1: Always check the latest file state to grab the up-to-date commit SHA identifier
            const getResponse = await fetch(url, { headers });
            
            if (getResponse.status === 200) {
                const data = await getResponse.json();
                currentSha = data.sha;
                const decodedContent = JSON.parse(atob(data.content));
                
                // Merge loaded data over the runtime baseline array
                if (Array.isArray(decodedContent)) {
                    if (action === 'fetch') {
                        currentBeers = [...greekSeedBeers, ...decodedContent];
                        connStatus.className = "status-badge status-connected";
                        connStatus.innerText = "Connected to GitHub Data File";
                    } else if (action === 'save' && newBeerObj) {
                        decodedContent.push(newBeerObj);
                        currentBeers = [...greekSeedBeers, ...decodedContent];
                        await pushToGitHub(url, headers, decodedContent);
                    }
                }
            } else if (getResponse.status === 404 && action === 'save' && newBeerObj) {
                // Handle non-existent configuration files cleanly
                const newArray = [newBeerObj];
                currentBeers.push(newBeerObj);
                await pushToGitHub(url, headers, newArray);
            } else {
                throw new Error("Unable to read data file structural integrity.");
            }
            renderFeed();
        } catch (err) {
            console.error(err);
            connStatus.className = "status-badge";
            connStatus.innerText = "Error syncing with GitHub";
            alert("GitHub API Synchronization Error: Check repo naming constraints, path values, or permissions scopes.");
        }
    }

    async function pushToGitHub(url, headers, dataArray) {
        const body = {
            message: "Database Sync: Logged a new regional craft beer",
            content: btoa(JSON.stringify(dataArray, null, 2)),
        };
        if (currentSha) body.sha = currentSha;

        const putResponse = await fetch(url, {
            method: "PUT",
            headers: headers,
            body: JSON.stringify(body)
        });

        if (putResponse.ok) {
            const putResData = await putResponse.json();
            currentSha = putResData.content.sha; // Update running file index SHA reference identifier
            alert("Successfully saved and committed change history to GitHub Repository!");
        } else {
            throw new Error("Commit transaction rejected by remote host infrastructure.");
        }
    }

    // Listeners
    document.getElementById('testConnectionBtn').addEventListener('click', () => syncWithGitHub('fetch'));
    
    beerForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const newBeer = {
            id: Date.now(),
            name: document.getElementById('beerName').value.trim(),
            brewery: document.getElementById('brewery').value.trim(),
            region: document.getElementById('region').value.trim(),
            style: document.getElementById('beerStyle').value.trim(),
            abv: document.getElementById('beerAbv').value,
            rating: document.getElementById('beerRating').value,
            notes: document.getElementById('beerNotes').value.trim()
        };

        syncWithGitHub('save', newBeer);
        beerForm.reset();
    });

    // Run baseline feed on startup
    renderFeed();
</script>
</body>
</html>
